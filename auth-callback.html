<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returning to DooCoins…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B334D;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
    }
    .card h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }
    .card p {
      font-size: 15px;
      color: #a0c4d8;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #00A4D7;
      color: white;
      padding: 16px 40px;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(0, 164, 215, 0.35);
      transition: background 0.15s;
    }
    .btn:active { background: #0090bd; }
    .error {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.4);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      font-size: 14px;
      color: #ffaaaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Sign-in Complete</h1>
    <p>Tap the button below to return to DooCoins and finish logging in.</p>
    <a id="returnLink" class="btn" href="#">Return to DooCoins →</a>
    <div id="errorBox" class="error" style="display:none"></div>
  </div>
  <script>
    (function () {
      var hash = window.location.hash.substring(1);
      if (!hash) {
        document.getElementById('errorBox').textContent = 'Missing authentication data. Please try signing in again from the app.';
        document.getElementById('errorBox').style.display = 'block';
        return;
      }
      var deepLink = 'doocoins://ii-callback#' + hash;
      document.getElementById('returnLink').href = deepLink;
    })();
  </script>
</body>
</html>
